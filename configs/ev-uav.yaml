# Task
is_cls: False

# Train/Val/Test data split.
is_split: False

# Events filtering.
is_adaptive: False
base_events: 2.0e+4
every_k_points: 5
nb_neighbors: 32
std_ratio: 0.1

# To graph.
is_remove_graph: True
transform: False
gen_batch: 64
num_workers: 0

# Initialization model.
shuffle: True
opt_name: 'sgd'  # opts: 'adam', 'adamW', 'sgd'
criterion_name: 'bce'  # opts: 'smooth', 'cross', 'bce'
epochs: 50
batch_size: 1
lr: 5.0e-2
weight_decay: 1.0e-4
momentum: 0.9

# Lr scheduler.
is_lr_scheduler: True
lr_scheduler: 'cycle'  # opts: 'cosine', 'linear', 'step', 'cycle'
warmup_epochs: 20
decay_epochs: 30
min_lr: 5.0e-6
warmup_lr_init: 5.0e-7
decay_rate: 0.1

# Serialization.
in_chs: 4
grid_size: [6, 4, 5]
order: ['z', 'hilbert']  # opts: 'z', 'z-trans', 'hilbert', 'hilbert-trans'
stride: [2, 2]

# Encoder.
shuffle_orders: True
enable_rpe: False
enable_flash: True
upcast_attention: False
upcast_softmax: False
enc_depths: [2, 2, 2]
enc_chs: [32, 64, 128]
enc_heads: [2, 4, 8]
enc_patches: [32, 32, 32]
mlp_ratio: 4

# Decoder.
dec_depths: [2, 2]
dec_chs: [32, 64]
dec_heads: [2, 4]
dec_patches: [32, 32]

# Metrics.
roc: True
pd_detT: 50
correct_thresh: 0.0001

# Classify head.
num_classes: 1
